<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Tyson Portfolio</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-theme" style="background-color: var(--bg-floor); height: 100vh; display: flex; align-items: center; justify-content: center;">

  <div class="login-wrapper">
    <div style="display: flex; justify-content: center; margin-bottom: 20px;">
      <a href="/" class="logo-container">
        <div class="logo-spike"></div>
        <span>Abhinav.Tyson</span>
      </a>
    </div>
    <h1 class="login-title">Admin Space</h1>
    <p class="login-sub">Log in to post blogs and update portfolio sections</p>
    
    <form id="login-form">
      <div id="login-error-msg" class="form-status error" style="display: none;"></div>
      
      <div class="form-group">
        <label for="login-username" class="form-label">Username</label>
        <div style="position: relative;">
          <i class="fa-regular fa-user" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
          <input type="text" id="login-username" class="form-input" style="padding-left: 40px;" placeholder="Enter admin username" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="login-password" class="form-label">Password</label>
        <div style="position: relative;">
          <i class="fa-solid fa-lock" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
          <input type="password" id="login-password" class="form-input" style="padding-left: 40px;" placeholder="••••••••" required>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">
        Access Dashboard <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 8px;"></i>
      </button>
    </form>
    
    <div style="text-align: center; margin-top: 24px;">
      <a href="/" style="font-size: 13px; color: var(--text-body);"><i class="fa-solid fa-house"></i> Return to Homepage</a>
    </div>
  </div>

  <script src="/app.js"></script>
  <script src="/admin.js"></script>
  <script>
    // Theme setup based on local storage
    const storedTheme = localStorage.getItem('theme') || 'light';
    if (storedTheme === 'dark') {
      document.body.classList.add('dark-theme');
      document.body.classList.remove('light-theme');
    }
  </script>
</body>
</html>
